// ── UTILITIES ───────────────────────────────────────────────

function shuffle(a){
  const b=a.slice();
  for(let i=b.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [b[i],b[j]]=[b[j],b[i]];
  }
  return b;
}
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

function badge(g){
  const cl={wug:'bwug',flurp:'bflurp',zazzo:'bzazzo'};
  const lb={wug:'Wug',flurp:'Flurp',zazzo:'Zazzo'};
  return `<span class="cbadge ${cl[g]}">${lb[g]}</span>`;
}

function cimg(src,cls){
  return `<img src="${src}" class="char-img ${cls||''}" alt=""
    onerror="this.style.opacity=0.15">`;
}

// ── SPEECH SYNTHESIS ────────────────────────────────────────

let _nar='';
function say(txt){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  _nar=txt;
  const u=new SpeechSynthesisUtterance(txt);
  u.rate=0.87; u.pitch=1.1; u.volume=1;
  const vs=window.speechSynthesis.getVoices();
  const pref=vs.find(v=>
    v.name.includes('Samantha')||v.name.includes('Google US English')||
    v.name.includes('Karen')||v.name.includes('Moira')
  );
  if(pref) u.voice=pref;
  window.speechSynthesis.speak(u);
}
function reread(){ if(_nar) say(_nar); }

// ── SPEECH TEXT ─────────────────────────────────────────────

function mkSpeech(ep,role,tgt,act){
  if(ep==='hmm'){
    return role==='group'
      ? `Hmm, Wugs must like to ${act.g}.`
      : `Hmm, ${tgt} must like to ${act.i}.`;
  } else {
    return role==='group'
      ? `Yes, Wugs like to ${act.g}.`
      : `Yes, ${tgt} likes to ${act.i}.`;
  }
}

function showSetup(){
  window.speechSynthesis&&window.speechSynthesis.cancel();
  G.selAge=null;
  render(`
    <h2>Before we start...</h2>
    <p class="txt">What is your <strong>ID</strong>?</p>
    <input class="tinput" id="pidIn" type="text" placeholder="Type here!"/>
    <p class="txt" style="margin-top:6px;">How old are you?</p>
    <div class="age-row">
      ${[4,5,6,7,8].map(a=>
        `<button class="abtn" id="ab${a}" onclick="pickAge(${a})">${a}</button>`
      ).join('')}
    </div>
    <button class="btn g" id="goBtn" style="opacity:.5" disabled
      onclick="launchGame()">Start! 🌟</button>
  `);
  document.getElementById('pidIn').addEventListener('input',checkReady);
  say("What is your ID? And how old are you?");
}

function pickAge(a){
  G.selAge=a;
  [4,5,6,7,8].forEach(n=>{
    const b=document.getElementById('ab'+n);
    if(b) b.classList.toggle('sel',n===a);
  });
  checkReady();
}

function checkReady(){
  const pid=document.getElementById('pidIn');
  const go=document.getElementById('goBtn');
  if(!pid||!go) return;
  const ok=pid.value.trim().length>0&&G.selAge!==null;
  go.disabled=!ok;
  go.style.opacity=ok?'1':'.5';
}

function launchGame(){
  const pid=document.getElementById('pidIn');
  if(!pid||!pid.value.trim()) return;
  G.pid    =pid.value.trim();
  G.age    =G.selAge;
  G.t0     =new Date().toISOString();
  G.version=Math.random()<.5?'A':'B';
  G.bossB  =pick(['hmm1_boss','hmm2_boss','yes1_boss','yes2_boss']);
  G.closeB =pick(['hmm1_close','hmm2_close','yes1_close','yes2_close']);
  G.order  =Math.random()<.5?['boss','close']:['close','boss'];

  document.getElementById('rinfo').innerHTML=
    `PID: ${G.pid} | Age: ${G.age}<br>`+
    `Version: ${G.version}<br>`+
    `Boss: ${G.bossB}<br>Close: ${G.closeB}<br>`+
    `Order: ${G.order.join(' → ')}`;

  G.iStep=0;
  showIntro();
}

  G.curPAImg    =pick(tr.pAImgs);

    </div>

      <button class="ccard" onclick="recordResp(0,this)">
        ${cimg(G.curPAImg,'sm')}
        <div class="cname">${tr.pA}</div>${badge(tr.gA)}

// ── Response Recording ────────────────────────────────────

function recordResp(choice,el){
  if(G.locked) return;
  G.locked=true;

  const tr =TRIALS[G.version][G.curT];
  const cfg=curCfg();
  const bk =curB();
  const rt =Date.now()-G.tStart;

  const chosenName =choice===0?tr.pA:tr.pB;
  const chosenGroup=choice===0?tr.gA:tr.gB;
  const chosenRole =choice===0?cfg.aRole:cfg.bRole;
  const responseRecode=chosenRole==='group'?1:2;
  const hypothesisConsistent=
    (cfg.qType==='close'&&chosenRole==='individual')||
    (cfg.qType==='boss' &&chosenRole==='group')?1:0;

  G.resp.push({
    participantId:       G.pid,
    age:                 G.age,
    version:             G.version,
    blockBoss:           G.bossB,
    blockClose:          G.closeB,
    blockOrder:          G.order.join('_'),
    blockCurrent:        bk,
    questionType:        cfg.qType,
    epistemic:           cfg.ep,
    personA_role:        cfg.aRole,
    personB_role:        cfg.bRole,
    dataExportTag:       tr.ids[BSUFFIX[bk]],
    target:              tr.tgt,
    behavior:            tr.beh,
    personA:             tr.pA,
    groupA:              tr.gA,
    personB:             tr.pB,
    groupB:              tr.gB,
    speechA:             mkSpeech(cfg.ep,cfg.aRole,tr.tgt,tr.act),
    speechB:             mkSpeech(cfg.ep,cfg.bRole,tr.tgt,tr.act),
    actionImageShown:    G.curActionImg,
    portraitAShown:      G.curPAImg,
    portraitBShown:      G.curPBImg,
    chosenName,
    chosenGroup,
    chosenRole,
    responseRecode,
    hypothesisConsistent,
    rt_ms:               rt,
    timestamp:           new Date().toISOString()
  });

  el.classList.add('chosen');
  document.querySelectorAll('.ccard').forEach(c=>c.classList.add('lock'));

  try{ localStorage.setItem('wugVillage_'+G.pid,JSON.stringify(G)); }catch(e){}

  setTimeout(()=>{ G.tIdx++; nextTrial(); },700);
}

// ── Between Blocks ────────────────────────────────────────

function advBlock(){
  G.bIdx++;
  if(G.bIdx>=2){ showEnd(); return; }
  G.tOrder=shuffle([0,1,2,3,4,5]);
  G.tIdx=0;
  showBreak();
}

function showBreak(){
  render(`
    <img src="star_reward.png"

    </p>
    <p class="txt" style="font-size:.9em;color:#95a5a6;">
      ${G.resp.length} questions answered ✓

// ═══════════════════════════════════════════════════════════
//  DATA EXPORT
// ═══════════════════════════════════════════════════════════

function dlCSV(){
  if(!G.resp.length){ alert('No data yet!'); return; }
  const cols=[
    'participantId','age','version',
    'blockBoss','blockClose','blockOrder','blockCurrent',
    'questionType','epistemic','personA_role','personB_role',
    'dataExportTag','target','behavior',
    'personA','groupA','personB','groupB',
    'speechA','speechB',
    'actionImageShown','portraitAShown','portraitBShown',
    'chosenName','chosenGroup','chosenRole',
    'responseRecode','hypothesisConsistent',
    'rt_ms','timestamp'
  ];
  const esc=v=>`"${String(v===undefined?'':v).replace(/"/g,'""')}"`;
  const rows=G.resp.map(r=>cols.map(c=>esc(r[c])).join(','));
  const csv=[cols.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`wugvillage_${G.pid}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── Researcher helpers ────────────────────────────────────

function skipEnd(){
  window.speechSynthesis&&window.speechSynthesis.cancel();
  showEnd();
}

// ── Init ─────────────────────────────────────────────────

if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}
showWelcome();
