  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Comic Sans MS','Chalkboard SE',cursive;
      background:linear-gradient(135deg,#87ceeb 0%,#a8e6cf 100%);
      min-height:100vh;display:flex;justify-content:center;
      align-items:flex-start;padding:12px;
    }
    #gc{
      background:#fff;border-radius:24px;padding:22px;
      max-width:780px;width:100%;
      box-shadow:0 8px 32px rgba(0,0,0,.12);
      min-height:90vh;display:flex;flex-direction:column;
      align-items:center;gap:14px;
    }
    .screen{
      width:100%;display:flex;flex-direction:column;
      align-items:center;gap:13px;
      animation:fadeIn .3s ease;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* ── Speaking bounce ── */
    @keyframes speakBounce{
      0%,100%{transform:translateY(0)   rotate(0deg)  scale(1)}
      20%    {transform:translateY(-12px) rotate(-5deg) scale(1.05)}
      60%    {transform:translateY(-12px) rotate(5deg)  scale(1.05)}
      80%    {transform:translateY(-4px)  rotate(0deg)  scale(1.02)}
    }
    .speaking{animation:speakBounce 0.65s ease-in-out infinite}

    /* ── Star pop ── */
    @keyframes starPop{
      0%  {transform:scale(0) rotate(-20deg);opacity:0}
      60% {transform:scale(1.5) rotate(10deg);opacity:1}
      100%{transform:scale(1)  rotate(0deg); opacity:1}
    }
    .star-pop{animation:starPop .5s ease-out forwards}

    h1{font-size:2em;color:#e74c3c;text-align:center;text-shadow:2px 2px #ffeaa7}
    h2{font-size:1.45em;color:#2c3e50;text-align:center}
    .txt{font-size:1.1em;line-height:1.65;color:#2c3e50;text-align:center;max-width:600px}

    .dirs{
      font-size:1.05em;color:#34495e;text-align:center;
      background:#eaf4ff;border-radius:14px;padding:11px 18px;
      width:100%;max-width:620px;
      border-left:5px solid #3498db;line-height:1.55;
    }

    /* ── Buttons ── */
    .btn{
      background:linear-gradient(145deg,#3498db,#2980b9);color:#fff;
      border:none;padding:13px 26px;border-radius:50px;
      font-size:1.15em;font-family:inherit;cursor:pointer;
      box-shadow:0 4px 12px rgba(52,152,219,.4);
      transition:transform .1s,opacity .2s;touch-action:manipulation;
    }
    .btn:active{transform:scale(.97)}
    .btn.g {background:linear-gradient(145deg,#2ecc71,#27ae60)}
    .btn.or{
      background:linear-gradient(145deg,#f39c12,#e67e22);
      box-shadow:0 4px 14px rgba(243,156,18,.5);
      font-size:1.3em;padding:16px 36px;
    }
    .btn.sl{background:linear-gradient(145deg,#95a5a6,#7f8c8d)}
    .btn.sm{padding:8px 16px;font-size:.95em}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

    .age-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
    .abtn{
      background:#ecf0f1;color:#2c3e50;border:3px solid transparent;
      padding:11px 18px;border-radius:14px;font-size:1.2em;
      font-family:inherit;cursor:pointer;transition:all .2s;touch-action:manipulation;
    }
    .abtn.sel{background:#3498db;color:#fff;border-color:#2980b9}
    .tinput{
      font-size:1.15em;padding:11px 18px;
      border:3px solid #3498db;border-radius:50px;
      outline:none;font-family:inherit;
      width:100%;max-width:270px;text-align:center;
    }

    .star-slot.earned{color:#f39c12}
    .star-slot.empty {color:#ddd}
    .prog{text-align:center;font-size:.88em;color:#aaa;margin-top:-4px}

    .char-img{object-fit:contain;border-radius:12px;display:block}
    .char-img.sm {width:80px; height:80px}
    .char-img.md {width:120px;height:120px}
    .char-img.lg {width:170px;height:170px}
    .char-img.xl {width:230px;height:230px}

    .bflurp{background:#fdebd0;color:#ca6f1e}
    .bzazzo{background:#d5f5e3;color:#1e8449}

      justify-content:center;flex-wrap:wrap;width:100%;
    }

    .scene-img{

      object-fit:contain;border:3px solid #90caf9;
    }

    .sp-char{flex-shrink:0}
    .spbub{

      border-radius:16px;padding:13px 17px;
      font-size:1.08em;color:#2c3e50;flex:1;

      transition:opacity .45s ease, transform .45s ease;
    }
    .spbub.visible{opacity:1;transform:translateX(0)}

    /* ── Question box ── */
    .qbox{
      background:#f0f8ff;border:3px solid #3498db;
      border-radius:16px;padding:15px 20px;
      text-align:center;width:100%;max-width:620px;
      opacity:0;transform:translateY(8px);
      transition:opacity .5s ease, transform .5s ease;

    .qbox.boss{background:#fef9e7;border-color:#e67e22}
    .qbox.show{opacity:1;transform:translateY(0)}
    .qtxt{font-size:1.22em;color:#2c3e50;font-weight:700}
    .qdef{font-size:.9em;color:#7f8c8d;margin-top:7px;line-height:1.5;font-style:italic}

    /* ── Choices ── */
    .choices{

      opacity:0;transform:translateY(8px);

    }
    .choices.show{opacity:1;transform:translateY(0)}
    .ccard{

      border-radius:18px;padding:16px 20px;
      cursor:pointer;display:flex;flex-direction:column;
      align-items:center;gap:8px;
      transition:all .15s;min-width:150px;
      touch-action:manipulation;-webkit-tap-highlight-color:transparent;

    .cname{font-size:1.15em;font-weight:700;color:#2c3e50}

// ── UTILITIES ───────────────────────────────────────────────

function shuffle(a){
  const b=a.slice();
  for(let i=b.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [b[i],b[j]]=[b[j],b[i]];
  }
  return b;
}
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

function badge(g){
  const cl={wug:'bwug',flurp:'bflurp',zazzo:'bzazzo'};
  const lb={wug:'Wug',flurp:'Flurp',zazzo:'Zazzo'};
  return `<span class="cbadge ${cl[g]}">${lb[g]}</span>`;
}

function cimg(src, cls, id){
  const idStr = id ? `id="${id}"` : '';

    alt="" onerror="this.style.opacity=0.15">`;
}

// ── SPEECH ──────────────────────────────────────────────────

let _nar = '';

function getVoice(){
  const vs = window.speechSynthesis.getVoices();
  return vs.find(v =>
    v.name.includes('Samantha') || v.name.includes('Google US English') ||
    v.name.includes('Karen')    || v.name.includes('Moira')
  ) || null;
}

function say(txt){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  _nar = txt;
  const u = new SpeechSynthesisUtterance(txt);
  u.rate = 0.87; u.pitch = 1.1; u.volume = 1;
  const v = getVoice(); if(v) u.voice = v;
  window.speechSynthesis.speak(u);
}

function reread(){ if(_nar) say(_nar); }

function speakThen(text, cb){
  if(!window.speechSynthesis){ setTimeout(cb, 100); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.85; u.pitch = 1.05; u.volume = 1;
  const v = getVoice(); if(v) u.voice = v;
  const fallback = setTimeout(()=>cb(), text.length * 85 + 2000);
  u.onend = ()=>{ clearTimeout(fallback); cb(); };
  window.speechSynthesis.speak(u);
}

// Animate a character image while speaking a line
function speakWithAnim(imgId, text, cb){
  const img = document.getElementById(imgId);
  if(img) img.classList.add('speaking');
  speakThen(text, ()=>{
    if(img) img.classList.remove('speaking');
    cb();
  });
}

// ── SPEECH TEXT ─────────────────────────────────────────────

function mkSpeech(ep, role, tgt, act){
  if(ep === 'hmm'){
    return role === 'group'
      ? `Hmm, Wugs must like to ${act.g}.`
      : `Hmm, ${tgt} must like to ${act.i}.`;
  } else {
    return role === 'group'
      ? `Yes, Wugs like to ${act.g}.`
      : `Yes, ${tgt} likes to ${act.i}.`;
  }
}

// ── EFFECTIVE ROLES (per-trial swap) ────────────────────────
// G.curSwap = true  → orange gets bRole, green gets aRole
// G.curSwap = false → orange gets aRole, green gets bRole

function effRoles(){
  const cfg = curCfg();
  return {
    rA: G.curSwap ? cfg.bRole : cfg.aRole,   // orange character's actual role
    rB: G.curSwap ? cfg.aRole : cfg.bRole    // green character's actual role
  };
}

function pickAge(a){
  G.selAge = a;
  [4,5,6,7,8].forEach(n=>{
    const b = document.getElementById('ab'+n);
    if(b) b.classList.toggle('sel', n===a);
  });

function checkReady(){
  const pid = document.getElementById('pidIn');
  const go  = document.getElementById('goBtn');
  if(!pid||!go) return;
  const ok = pid.value.trim().length > 0 && G.selAge !== null;
  go.disabled = !ok;
  go.style.opacity = ok ? '1' : '.5';
}

function launchGame(){
  const pid = document.getElementById('pidIn');
  if(!pid || !pid.value.trim()) return;
  G.pid  = pid.value.trim();
  G.age  = G.selAge;
  G.t0   = new Date().toISOString();

  G.bossB  = pick(['hmm1_boss', 'hmm2_boss', 'yes1_boss', 'yes2_boss']);
  G.closeB = pick(['hmm1_close','hmm2_close','yes1_close','yes2_close']);
  G.order  = Math.random() < .5 ? ['boss','close'] : ['close','boss'];

  // ── VERSION ASSIGNMENT ─────────────────────────────────
  // First block always gets a different version than second block
  // Which block gets A vs B is random
  const firstVer  = Math.random() < .5 ? 'A' : 'B';
  const secondVer = firstVer === 'A' ? 'B' : 'A';
  G.versionMap[G.order[0]] = firstVer;
  G.versionMap[G.order[1]] = secondVer;

  document.getElementById('rinfo').innerHTML =
    `PID: ${G.pid} | Age: ${G.age}<br>`+
    `Order: ${G.order.join(' → ')}<br>`+
    `${G.order[0]}: ${G.order[0]==='boss'?G.bossB:G.closeB} (Ver ${firstVer})<br>`+
    `${G.order[1]}: ${G.order[1]==='boss'?G.bossB:G.closeB} (Ver ${secondVer})`;

  G.iStep = 0;
  showIntro();
}

// ── triggerSpeech ────────────────────────────────────────────

function triggerSpeech(){
  const tr  = TRIALS[curVersion()][G.curT];
  const cfg = curCfg();
  const er  = effRoles();

  const spA = mkSpeech(cfg.ep, er.rA, tr.tgt, tr.act);
  const spB = mkSpeech(cfg.ep, er.rB, tr.tgt, tr.act);

  window.speechSynthesis.cancel();

  const btn  = document.getElementById('playBtn');
  const bubA = document.getElementById('bub-a');
  const bubB = document.getElementById('bub-b');

  if(btn){ btn.textContent = '🔊 Playing...'; btn.disabled = true; }

  // pA speaks + shakes
  if(bubA) bubA.classList.add('visible');
  speakWithAnim('spk-a', spA, ()=>{
    setTimeout(()=>{
      // pB speaks + shakes
      if(bubB) bubB.classList.add('visible');
      speakWithAnim('spk-b', spB, ()=>{
        G.speechDone = true;
        revealQuestion();
        if(btn){ btn.textContent = '🔊 Hear again'; btn.disabled = false; }

        // Read question aloud
        const isC = cfg.qType === 'close';
        const q = isC
          ? `Who is ${tr.tgt} closer to, ${tr.pA} or ${tr.pB}? ${CLOSE_DEF}`
          : `Who do you think is ${tr.tgt}'s boss, ${tr.pA} or ${tr.pB}? ${BOSS_DEF.replace('[Name]',tr.tgt)}`;
        setTimeout(()=>say(q), 600);
      });
    }, 400);
  });
}

function revealQuestion(){
  const qbox    = document.getElementById('qbox');
  const choices = document.getElementById('choices');
  if(qbox)    qbox.classList.add('show');
  if(choices) choices.classList.add('show');
}

// ── Response Recording ────────────────────────────────────────

function recordResp(choice, el){
  if(G.locked) return;
  G.locked = true;

  const tr  = TRIALS[curVersion()][G.curT];
  const cfg = curCfg();
  const er  = effRoles();
  const bk  = curB();
  const rt  = Date.now() - (G.tStart || Date.now());
  const ver = curVersion();

  // Which character was chosen and what was their effective role
  const chosenName  = choice === 0 ? tr.pA  : tr.pB;
  const chosenGroup = choice === 0 ? tr.gA  : tr.gB;
  const chosenRole  = choice === 0 ? er.rA  : er.rB;

  const responseRecode = chosenRole === 'group' ? 1 : 2;
  const hypothesisConsistent =
    (cfg.qType==='close' && chosenRole==='individual') ||
    (cfg.qType==='boss'  && chosenRole==='group') ? 1 : 0;

  G.resp.push({
    participantId:       G.pid,
    age:                 G.age,
    versionThisBlock:    ver,
    versionClose:        G.versionMap['close'],
    versionBoss:         G.versionMap['boss'],
    blockBoss:           G.bossB,
    blockClose:          G.closeB,
    blockOrder:          G.order.join('_'),
    blockCurrent:        bk,
    questionType:        cfg.qType,
    epistemic:           cfg.ep,
    // original block-level roles
    blockRoleA:          cfg.aRole,
    blockRoleB:          cfg.bRole,
    // effective roles after per-trial swap
    rolesSwapped:        G.curSwap,
    effectiveRoleA:      er.rA,
    effectiveRoleB:      er.rB,
    dataExportTag:       tr.ids[BSUFFIX[bk]],
    target:              tr.tgt,
    behavior:            tr.beh,
    personA:             tr.pA,
    groupA:              tr.gA,
    personB:             tr.pB,
    groupB:              tr.gB,
    speechA:             mkSpeech(cfg.ep, er.rA, tr.tgt, tr.act),
    speechB:             mkSpeech(cfg.ep, er.rB, tr.tgt, tr.act),
    portraitImgShown:    G.curPortraitImg,
    actionImgShown:      G.curActionImg,
    orangeImgShown:      G.curPAImg,
    greenImgShown:       G.curPBImg,
    chosenName, chosenGroup, chosenRole,
    responseRecode, hypothesisConsistent,
    rt_ms:               rt,
    timestamp:           new Date().toISOString()
  });

  el.classList.add('chosen');
  document.querySelectorAll('.ccard').forEach(c=>c.classList.add('lock'));
  try{ localStorage.setItem('twizzle_'+G.pid, JSON.stringify(G)); }catch(e){}

  G.totalDone++;
  G.tIdx++;

  setTimeout(()=>{
    if(G.totalDone % 2 === 0){
      G.stars = Math.min(6, G.totalDone / 2);
      showStarEarned();
    } else {
      nextTrial();
    }
  }, 700);
}

  G.bIdx++;

  G.tOrder = shuffle([0,1,2,3,4,5]);
  G.tIdx   = 0;
  showBkIntro();
}

      style="width:140px;height:140px;object-fit:contain;"
      alt="Star" onerror="this.style.display='none'">
    ${starMeterHTML()}
    <p class="txt" style="font-size:1.2em;">
      Thank you <strong>SO much</strong>
      for visiting ${VILLAGE}!<br>
      You were absolutely <strong>AMAZING!</strong>
    </p>
    <p class="txt" style="font-size:.9em;color:#95a5a6;">
      ${G.resp.length} questions answered ✓
    </p>
    <button class="btn g" onclick="dlCSV()">💾 Save My Data</button>
  `);
  say(`You did it! Thank you so much for visiting ${VILLAGE}! You were absolutely amazing!`);
}

//  DATA EXPORT

function dlCSV(){
  if(!G.resp.length){ alert('No data yet!'); return; }
  const cols = [
    'participantId','age',
    'versionThisBlock','versionClose','versionBoss',
    'blockBoss','blockClose','blockOrder','blockCurrent',
    'questionType','epistemic',
    'blockRoleA','blockRoleB',
    'rolesSwapped','effectiveRoleA','effectiveRoleB',
    'dataExportTag','target','behavior',
    'personA','groupA','personB','groupB',
    'speechA','speechB',
    'portraitImgShown','actionImgShown',
    'orangeImgShown','greenImgShown',
    'chosenName','chosenGroup','chosenRole',
    'responseRecode','hypothesisConsistent',
    'rt_ms','timestamp'
  ];
  const esc  = v => `"${String(v===undefined?'':v).replace(/"/g,'""')}"`;
  const rows = G.resp.map(r => cols.map(c => esc(r[c])).join(','));
  const csv  = [cols.join(','), ...rows].join('\n');
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `twizzle_${G.pid}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function skipEnd(){
  window.speechSynthesis && window.speechSynthesis.cancel();
  showEnd();
}

// ── Init ─────────────────────────────────────────────────────

if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged = ()=>window.speechSynthesis.getVoices();
}
showWelcome();
</script>
