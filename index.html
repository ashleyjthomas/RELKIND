<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Twizzle Town</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background:linear-gradient(135deg,#87ceeb 0%,#a8e6cf 100%);
      min-height:100vh;display:flex;justify-content:center;
      align-items:flex-start;padding:6px;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    #gc{
      background:#fff;border-radius:20px;padding:14px 16px;
      max-width:860px;width:100%;
      box-shadow:0 8px 32px rgba(0,0,0,.12);
      display:flex;flex-direction:column;
      align-items:center;gap:8px;
    }
    .screen{
      width:100%;display:flex;flex-direction:column;
      align-items:center;gap:8px;
      animation:fadeIn .3s ease;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes speakBounce{
      0%,100%{transform:translateY(0)   rotate(0deg)  scale(1)}
      20%    {transform:translateY(-12px) rotate(-5deg) scale(1.05)}
      60%    {transform:translateY(-12px) rotate(5deg)  scale(1.05)}
      80%    {transform:translateY(-4px)  rotate(0deg)  scale(1.02)}
    }
    .speaking{animation:speakBounce 0.65s ease-in-out infinite}
    @keyframes starPop{
      0%  {transform:scale(0) rotate(-20deg);opacity:0}
      60% {transform:scale(1.5) rotate(10deg);opacity:1}
      100%{transform:scale(1)  rotate(0deg); opacity:1}
    }
    .star-pop{animation:starPop .5s ease-out forwards;color:#f39c12;line-height:1}
    h1{font-size:1.85em;color:#e74c3c;text-align:center;font-weight:800;letter-spacing:-0.5px;margin:2px 0}
    h2{font-size:1.4em;color:#2c3e50;text-align:center;font-weight:700;margin:2px 0}
    .txt{font-size:1.02em;line-height:1.5;color:#2c3e50;text-align:center;max-width:640px;font-weight:600}
    .dirs{
      font-size:1em;color:#34495e;text-align:center;
      background:#eaf4ff;border-radius:12px;padding:9px 16px;
      width:100%;max-width:680px;
      border-left:5px solid #3498db;line-height:1.5;
      font-weight:600;
    }
    .btn{
      background:linear-gradient(145deg,#3498db,#2980b9);color:#fff;
      border:none;padding:11px 22px;border-radius:50px;
      font-size:1.08em;font-family:inherit;font-weight:700;cursor:pointer;
      box-shadow:0 4px 12px rgba(52,152,219,.4);
      transition:transform .1s,opacity .2s;touch-action:manipulation;
      letter-spacing:.2px;
    }
    .btn:active{transform:scale(.97)}
    .btn.g {background:linear-gradient(145deg,#2ecc71,#27ae60)}
    .btn.or{
      background:linear-gradient(145deg,#f39c12,#e67e22);
      box-shadow:0 4px 14px rgba(243,156,18,.5);
      font-size:1.25em;padding:16px 36px;
    }
    .btn.sl{background:linear-gradient(145deg,#95a5a6,#7f8c8d)}
    .btn.sm{padding:8px 16px;font-size:.95em}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
    .age-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
    .abtn{
      background:#ecf0f1;color:#2c3e50;border:3px solid transparent;
      padding:11px 18px;border-radius:14px;font-size:1.2em;
      font-family:inherit;font-weight:700;cursor:pointer;
      transition:all .2s;touch-action:manipulation;
    }
    .abtn.sel{background:#3498db;color:#fff;border-color:#2980b9}
    .tinput{

      outline:none;font-family:inherit;font-weight:600;

    .star-slot.empty {color:#e0e0e0}

    .char-img{object-fit:contain;border-radius:12px;display:block}

    .char-img.md {width:96px; height:96px}
    .char-img.lg {width:130px;height:130px}
    .char-img.xl {width:170px;height:170px}

    .title-img{width:100%;max-width:300px;border-radius:16px;object-fit:contain}

    .clbl{font-size:.98em;font-weight:700;color:#2c3e50;text-align:center}

    .bflurp{background:#fdebd0;color:#ca6f1e}
    .bzazzo{background:#d5f5e3;color:#1e8449}

<script>
// ═══════════════════════════════════════════════════════════
//  TWIZZLE TOWN — Child Study Game v11
//  ashleyjthomas/RELKIND
//  - Restored relationship-setup story text (adult-version style)
//  - Tighter layout (no scrolling on tablets/laptops)
//  - First-name field; CHS ID auto-grabbed from URL
//  - Closer/Boss definition shown as images (CShugging/ARchair)
//  - Mid-game video + end-screen video
// ═══════════════════════════════════════════════════════════
const VILLAGE   = "Twizzle Town";
const CLOSE_DEF = "That means that they love each other more, tell each other more secrets, and give each other hugs.";
const BOSS_DEF  = "That means they are in charge — they tell [Name] what to do, and [Name] listens.";

// ── CHS ID auto-capture ───────────────────────────────────────
// Pulls the participant identifier from common URL params used by
// CHS (Children Helping Science) and similar platforms. If nothing
// is found, we fall back to the child's first name as the ID.
function _getChsId(){
  try{
    const p = new URLSearchParams(window.location.search);
    const KEYS = [
      'child_hashed_id','child_id','childId','childID',
      'chs_child_id','chsId','chs_id',
      'participantId','participant_id','pid',
      'sessionId','session_id','response_id',
      'subject_id','subjectId'
    ];
    for(const k of KEYS){
      const v = p.get(k);
      if(v && v.trim()) return v.trim();
    }
  }catch(e){}
  return '';
}
const _CHS_ID = _getChsId();

// ── Google Sheets webhook ─────────────────────────────────────
// Paste the Web App URL from your Apps Script deployment here.
// Format: https://script.google.com/macros/s/AKfycb.../exec
// Leave empty to disable auto-upload.
const SHEETS_WEBHOOK = 'PASTE_YOUR_WEB_APP_URL_HERE';

// Column order shared by the CSV export and the Google Sheet
const CSV_COLS = [
  'participantId','chsId','firstName','age',
  'versionThisBlock','versionClose','versionBoss',
  'blockBoss','blockClose','blockOrder','blockCurrent',
  'questionType','epistemic',
  'blockRoleA','blockRoleB',
  'rolesSwapped','effectiveRoleA','effectiveRoleB',
  'dataExportTag','target','behavior',
  'personA','groupA','personB','groupB',
  'speechA','speechB',
  'portraitImgShown','actionImgShown',
  'orangeImgShown','greenImgShown',
  'chosenName','chosenGroup','chosenRole',
  'responseRecode','hypothesisConsistent',
  'rt_ms','timestamp'
];

function _postToSheets(row){
  if(!SHEETS_WEBHOOK || SHEETS_WEBHOOK.indexOf('PASTE_') === 0) return;
  try{
    // text/plain body avoids CORS preflight; Apps Script reads e.postData.contents
    fetch(SHEETS_WEBHOOK, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body:    JSON.stringify({ headers: CSV_COLS, row: row })
    }).catch(function(e){ console.warn('[Sheets] post failed:', e); });
  }catch(e){ console.warn('[Sheets] post threw:', e); }
}

// ── MID-GAME + END-GAME VIDEOS ────────────────────────────────
const MID_VIDEO = {
  type: 'local',
  src:  'mixkit-three-funny-multicoloured-men-dancing-to-upbeat-music-44877-hd-ready.mp4'
};
const END_VIDEO = {
  type: 'local',
  src:  'mixkit-three-funny-multicoloured-men-dancing-to-upbeat-music-44877-hd-ready.mp4'
};

// ── Reusable SVG star (filled — currentColor) ────────────────
const STAR_SVG =
  '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">' +
  '<path d="M12 2.1l2.95 5.98 6.6.96-4.78 4.66 1.13 6.58L12 17.18l-5.9 3.1 1.13-6.58L2.45 9.04l6.6-.96L12 2.1z"/>' +
  '</svg>';
const STAR_SVG_OUTLINE =
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" aria-hidden="true">' +
  '<path d="M12 2.6l2.95 5.98 6.6.96-4.78 4.66 1.13 6.58L12 17.68l-5.9 3.1 1.13-6.58L2.45 9.54l6.6-.96L12 2.6z"/>' +
  '</svg>';

// ═══════════════════════════════════════════════════════════
//  AUDIO ENGINE
// ═══════════════════════════════════════════════════════════
let _aud     = null;
let _lastKey = null;
let _audioUnlocked = false;
function _unlockAudio() {
  if (_audioUnlocked) return;
  _audioUnlocked = true;
  const silence = new Audio('data:audio/mp3;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAACcQCAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICA');
  silence.play().catch(()=>{});
}
document.addEventListener('click',  _unlockAudio, {once:false});
document.addEventListener('touchend', _unlockAudio, {once:false});

function _play(key, onEnd) {
  if (_aud) {
    _aud.pause();
    _aud.onended = null;
    _aud.onerror = null;
    _aud = null;
  }
  if (!key) { if (onEnd) onEnd(); return; }
  _lastKey = key;
  const a  = new Audio(key + '.mp3');
  _aud     = a;
  const done = function() {
    a.onended = null;
    a.onerror = null;
    if (_aud === a) _aud = null;
    if (onEnd) onEnd();
  };
  a.onended = done;
  a.onerror = function() {
    console.warn('[Audio] missing or failed:', key + '.mp3');
    done();
  };
  const p = a.play();
  if (p && typeof p.catch === 'function') {
    p.catch(function(e) {
      console.warn('[Audio] play() blocked:', e.message, key + '.mp3');
      setTimeout(function() {
        if (_aud === a) done();
      }, 300);
    });
  }
}
function say(key)                       { _play(key, null); }
function speakThen(key, cb)             { _play(key, cb);   }
function speakWithAnim(imgId, key, cb)  {
  const img = document.getElementById(imgId);
  if (img) img.classList.add('speaking');
  _play(key, function() {
    if (img) img.classList.remove('speaking');
    if (cb) cb();
  });
}
function reread() { if (_lastKey) _play(_lastKey, null); }

// ── Audio chain (cancellable on navigation) ──────────────────
// Fixes the bug where setTimeout-scheduled likeA/likeB playback
// could fire after the user clicked "What happened?", playing
// the wrong audio over the new screen.
let _pendingTimeouts = [];
function _chainTimeout(fn, ms) {
  const id = setTimeout(function() {
    _pendingTimeouts = _pendingTimeouts.filter(function(t){ return t !== id; });
    fn();
  }, ms);
  _pendingTimeouts.push(id);
}
function _cancelChain() {
  _pendingTimeouts.forEach(function(t){ clearTimeout(t); });
  _pendingTimeouts = [];
}
function speakChain(steps) {
  // Steps: [{key, imgId?, delay?}]. Cancellable on render().
  let i = 0;
  function next() {
    if (i >= steps.length) return;
    const s = steps[i++];
    _chainTimeout(function() {
      if (s.imgId) {
        speakWithAnim(s.imgId, s.key, next);
      } else {
        speakThen(s.key, next);
      }
    }, s.delay || 0);
  }
  next();
}

function speechKey(ep, role, trKey) {
  const r = (role === 'group') ? 'group' : 'ind';
  return trKey + '_' + ep + '_' + r;
}
function questionKey(qType, trKey) {
  return trKey + '_q_' + qType;
}

// ═══════════════════════════════════════════════════════════
//  IMAGE POOLS
// ═══════════════════════════════════════════════════════════
const ORANGE_IMGS = [
  'orange2.png','orange3.png','orange4.png','orange6.png',
  'orange7.png','orange8.png','orange9.png','orange10.png',
  'orange11.png','orange13.png','orange14.png','orange15.png'
];
const GREEN_IMGS = [
  'green.png','green1.png','green2.png','green6.png',
  'green7.png','green9.png','green10.png','green11.png','green12.png'
];

// ═══════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════
function shuffle(a){
  const b=a.slice();
  for(let i=b.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [b[i],b[j]]=[b[j],b[i]];
  }
  return b;
}
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function badge(g){
  const cl={wug:'bwug',flurp:'bflurp',zazzo:'bzazzo'};
  const lb={wug:'Wug',flurp:'Flurp',zazzo:'Zazzo'};
  return `<span class="cbadge ${cl[g]}">${lb[g]}</span>`;
}
function cimg(src, cls, id){
  const idStr = id ? `id="${id}"` : '';
  return `<img src="${src}" ${idStr} class="char-img ${cls||''}"
    alt="" onerror="this.style.opacity=0.15">`;
}

// ═══════════════════════════════════════════════════════════
//  BLOCK CONFIGS
// ═══════════════════════════════════════════════════════════
const BCFG = {
  hmm1_close:{ep:'hmm',aRole:'group',      bRole:'individual',qType:'close'},
  hmm2_close:{ep:'hmm',aRole:'individual', bRole:'group',     qType:'close'},
  yes1_close:{ep:'yes',aRole:'group',      bRole:'individual',qType:'close'},
  yes2_close:{ep:'yes',aRole:'individual', bRole:'group',     qType:'close'},
  hmm1_boss: {ep:'hmm',aRole:'group',      bRole:'individual',qType:'boss'},
  hmm2_boss: {ep:'hmm',aRole:'individual', bRole:'group',     qType:'boss'},
  yes1_boss: {ep:'yes',aRole:'group',      bRole:'individual',qType:'boss'},
  yes2_boss: {ep:'yes',aRole:'individual', bRole:'group',     qType:'boss'},
};
const BSUFFIX = {
  hmm1_close:'hmm1c', hmm2_close:'hmm2c',
  yes1_close:'yes1c', yes2_close:'yes2c',
  hmm1_boss:'hmm1b',  hmm2_boss:'hmm2b',
  yes1_boss:'yes1b',  yes2_boss:'yes2b',
};

// ═══════════════════════════════════════════════════════════
//  TRIAL DATA
// ═══════════════════════════════════════════════════════════
const TRIALS = {
  A:[
    {

function mkSpeech(ep, role, tgt, act){
  if(ep==='hmm'){
    return role==='group'
      ? `Hmm, Wugs must like to ${act.g}.`
      : `Hmm, ${tgt} must like to ${act.i}.`;
  } else {
    return role==='group'
      ? `Yes, Wugs like to ${act.g}.`
      : `Yes, ${tgt} likes to ${act.i}.`;
  }
}

function effRoles(){
  const cfg = curCfg();
  return {
    rA: G.curSwap ? cfg.bRole : cfg.aRole,
    rB: G.curSwap ? cfg.aRole : cfg.bRole
  };
}

function render(h){

  _cancelChain();

}

function starMeterHTML(){
  let h = '<div class="star-meter">';

    const earned = i < G.stars;
    h += `<span class="star-slot ${earned?'earned':'empty'}">${earned?STAR_SVG:STAR_SVG_OUTLINE}</span>`;
  }
  return h + '</div>';
}

function showSetup(){
  if(_aud){ _aud.pause(); }
  G.selAge = null;
  render(`

    <p class="txt">What's your <strong>first name</strong>?</p>
    <input class="tinput" id="pidIn" type="text" placeholder="Type your name!" autocomplete="off"/>

    <div class="age-row">
      ${[4,5,6,7,8].map(a=>
        `<button class="abtn" id="ab${a}" onclick="pickAge(${a})">${a}</button>`
      ).join('')}
    </div>
    <button class="btn g" id="goBtn" style="opacity:.5" disabled
      onclick="launchGame()">Start</button>
  `);
  document.getElementById('pidIn').addEventListener('input', checkReady);
  say('setup');
}
function pickAge(a){
  G.selAge = a;
  [4,5,6,7,8].forEach(n=>{
    const b = document.getElementById('ab'+n);
    if(b) b.classList.toggle('sel', n===a);
  });
  checkReady();
}
function checkReady(){
  const pid = document.getElementById('pidIn');
  const go  = document.getElementById('goBtn');
  if(!pid||!go) return;
  const ok = pid.value.trim().length > 0 && G.selAge !== null;
  go.disabled = !ok;
  go.style.opacity = ok ? '1' : '.5';
}
function launchGame(){
  const pid = document.getElementById('pidIn');
  if(!pid || !pid.value.trim()) return;
  G.firstName = pid.value.trim();
  // Participant identifier in data: CHS ID if present in URL, else first name
  G.pid       = G.chsId || G.firstName;
  G.age       = G.selAge;
  G.t0        = new Date().toISOString();
  G.bossB  = pick(['hmm1_boss','hmm2_boss','yes1_boss','yes2_boss']);
  G.closeB = pick(['hmm1_close','hmm2_close','yes1_close','yes2_close']);
  G.order  = Math.random() < .5 ? ['boss','close'] : ['close','boss'];
  const firstVer  = Math.random() < .5 ? 'A' : 'B';
  const secondVer = firstVer === 'A' ? 'B' : 'A';
  G.versionMap[G.order[0]] = firstVer;
  G.versionMap[G.order[1]] = secondVer;
  document.getElementById('rinfo').innerHTML =
    `Name: ${G.firstName} | Age: ${G.age}<br>`+
    `CHS: ${G.chsId || '(none)'}<br>`+
    `Order: ${G.order.join(' &rarr; ')}<br>`+
    `${G.order[0]}: ${G.order[0]==='boss'?G.bossB:G.closeB} (Ver ${firstVer})<br>`+
    `${G.order[1]}: ${G.order[1]==='boss'?G.bossB:G.closeB} (Ver ${secondVer})`;
  G.iStep = 0;
  showIntro();
}

function nextTrial(){
  G.speechDone = false;
  G.locked     = false;
  if(G.tIdx >= 6){ advBlock(); return; }
  G.curT = G.tOrder[G.tIdx];
  const tr = TRIALS[curVersion()][G.curT];
  G.curPortraitImg = tr.portraitImg;
  G.curActionImg   = tr.actionImg;
  G.curPAImg       = pick(ORANGE_IMGS);
  G.curPBImg       = pick(GREEN_IMGS);
  G.curSwap        = Math.random() < 0.5;
  showTrialChars();
}

        <div class="sp-char cw">
          ${cimg(G.curPAImg, 'md', 'spk-a')}
          <div class="clbl">${tr.pA}</div>${badge(tr.gA)}
        </div>
        <div id="bub-a" class="spbub">"${spA}"</div>
      </div>
      <div class="speech-row">
        <div class="sp-char cw">
          ${cimg(G.curPBImg, 'md', 'spk-b')}
          <div class="clbl">${tr.pB}</div>${badge(tr.gB)}
        </div>
        <div id="bub-b" class="spbub">"${spB}"</div>
      </div>
    </div>
    <button id="playBtn" class="btn or" onclick="triggerSpeech()">
      Hear what they say
    </button>
    <div id="qbox" class="qbox${isC ? '' : ' boss'}">
      <div class="qtxt">${qTxt}</div>
      ${defImg}
    </div>
    <div id="choices" class="choices">
      <button class="ccard" onclick="recordResp(0,this)">
        ${cimg(G.curPAImg, 'sm')}
        <div class="cname">${tr.pA}</div>${badge(tr.gA)}
      </button>
      <button class="ccard" onclick="recordResp(1,this)">
        ${cimg(G.curPBImg, 'sm')}
        <div class="cname">${tr.pB}</div>${badge(tr.gB)}
      </button>
    </div>
  `);
  if(G.speechDone){
    setTimeout(function(){
      ['bub-a','bub-b'].forEach(function(id){
        const el = document.getElementById(id);
        if(el) el.classList.add('visible');
      });
      revealQuestion();
      const btn = document.getElementById('playBtn');
      if(btn) btn.textContent = 'Hear again';
    }, 50);
  }
  say(tr.key + '_ask');
}

function triggerSpeech(){
  const tr  = TRIALS[curVersion()][G.curT];
  const cfg = curCfg();
  const er  = effRoles();
  // Cancel any in-flight chain (e.g. character intro) before kicking off the speech sequence
  _cancelChain();
  if(_aud){ _aud.pause(); }
  const btn  = document.getElementById('playBtn');
  const bubA = document.getElementById('bub-a');
  const bubB = document.getElementById('bub-b');
  if(btn){ btn.textContent = 'Playing...'; btn.disabled = true; }
  const keyA = speechKey(cfg.ep, er.rA, tr.key);
  const keyB = speechKey(cfg.ep, er.rB, tr.key);
  if(bubA) bubA.classList.add('visible');
  speakWithAnim('spk-a', keyA, function() {
    _chainTimeout(function() {
      if(bubB) bubB.classList.add('visible');
      speakWithAnim('spk-b', keyB, function() {
        G.speechDone = true;
        revealQuestion();
        if(btn){ btn.textContent = 'Hear again'; btn.disabled = false; }
        _chainTimeout(function(){
          say(questionKey(cfg.qType, tr.key));
        }, 600);
      });
    }, 400);
  });
}
function revealQuestion(){
  const qbox    = document.getElementById('qbox');
  const choices = document.getElementById('choices');
  if(qbox)    qbox.classList.add('show');
  if(choices) choices.classList.add('show');
  // Make sure the kid can see the answer buttons without scrolling themselves
  setTimeout(function(){
    if(choices && typeof choices.scrollIntoView === 'function'){
      try{ choices.scrollIntoView({behavior:'smooth', block:'center'}); }catch(e){}
    }
  }, 300);
}

// ═══════════════════════════════════════════════════════════
//  RESPONSE RECORDING
// ═══════════════════════════════════════════════════════════
function recordResp(choice, el){
  if(G.locked) return;
  G.locked = true;
  const tr  = TRIALS[curVersion()][G.curT];
  const cfg = curCfg();
  const er  = effRoles();
  const bk  = curB();
  const rt  = Date.now() - (G.tStart || Date.now());
  const ver = curVersion();
  const chosenName  = choice === 0 ? tr.pA  : tr.pB;
  const chosenGroup = choice === 0 ? tr.gA  : tr.gB;
  const chosenRole  = choice === 0 ? er.rA  : er.rB;
  const responseRecode = chosenRole === 'group' ? 1 : 2;
  const hypothesisConsistent =
    (cfg.qType==='close' && chosenRole==='individual') ||
    (cfg.qType==='boss'  && chosenRole==='group') ? 1 : 0;
  const rowData = {
    participantId:      G.pid,
    chsId:              G.chsId,
    firstName:          G.firstName,
    age:                G.age,
    versionThisBlock:   ver,
    versionClose:       G.versionMap['close'],
    versionBoss:        G.versionMap['boss'],
    blockBoss:          G.bossB,
    blockClose:         G.closeB,
    blockOrder:         G.order.join('_'),
    blockCurrent:       bk,
    questionType:       cfg.qType,
    epistemic:          cfg.ep,
    blockRoleA:         cfg.aRole,
    blockRoleB:         cfg.bRole,
    rolesSwapped:       G.curSwap,
    effectiveRoleA:     er.rA,
    effectiveRoleB:     er.rB,
    dataExportTag:      tr.ids[BSUFFIX[bk]],
    target:             tr.tgt,
    behavior:           tr.beh,
    personA:            tr.pA,
    groupA:             tr.gA,
    personB:            tr.pB,
    groupB:             tr.gB,
    speechA:            mkSpeech(cfg.ep, er.rA, tr.tgt, tr.act),
    speechB:            mkSpeech(cfg.ep, er.rB, tr.tgt, tr.act),
    portraitImgShown:   G.curPortraitImg,
    actionImgShown:     G.curActionImg,
    orangeImgShown:     G.curPAImg,
    greenImgShown:      G.curPBImg,
    chosenName, chosenGroup, chosenRole,
    responseRecode, hypothesisConsistent,
    rt_ms:              rt,
    timestamp:          new Date().toISOString()
  };
  G.resp.push(rowData);
  // Auto-upload to Google Sheets (no-op if SHEETS_WEBHOOK is not set)
  _postToSheets(rowData);
  el.classList.add('chosen');
  document.querySelectorAll('.ccard').forEach(c=>c.classList.add('lock'));
  try{ localStorage.setItem('twizzle_'+G.pid, JSON.stringify(G)); }catch(e){}
  G.totalDone++;
  G.tIdx++;
  setTimeout(function(){
    if(G.totalDone % 2 === 0){
      G.stars = Math.min(6, G.totalDone / 2);
      showStarEarned();
    } else {
      nextTrial();
    }
  }, 700);
}

// ═══════════════════════════════════════════════════════════
//  STAR EARNED
// ═══════════════════════════════════════════════════════════
function showStarEarned(){
  const isDone = G.totalDone === 12;
  const isHalf = G.totalDone === 6;
  render(`
    <div class="star-pop big-celebrate" style="width:120px;height:120px;">${STAR_SVG}</div>
    <h2>You earned a star!</h2>
    ${starMeterHTML()}
    <p class="txt">
      ${isDone ? 'You finished all the stories!'
      : isHalf ? 'Halfway there! You are doing so well!'
      :          'Great job! Keep going!'}
    </p>
    ${!isDone
      ? `<button class="btn g" onclick="nextTrial()">Keep going</button>`
      : ''}
  `);
  say(isDone ? 'star_done' : isHalf ? 'star_halfway' : 'star_generic');
  if(isDone) setTimeout(function(){ showEnd(); }, 2800);
}

// ═══════════════════════════════════════════════════════════
//  MID-GAME VIDEO BREAK
// ═══════════════════════════════════════════════════════════
function showMidVideo(){
  if(_aud){ _aud.pause(); _aud = null; }

  render(`
    <h2>Great job!</h2>
    ${starMeterHTML()}
    <p class="txt">
      You still have some more questions —<br>
      but first, watch this funny video!
    </p>
    <video
      id="mid-video"
      src="${MID_VIDEO.src}"
      controls
      autoplay
      playsinline
      style="
        width:100%;
        max-width:560px;
        border-radius:16px;
        box-shadow:0 6px 24px rgba(0,0,0,.18);
      "
      onerror="document.getElementById('mid-video-err').style.display='block'"
    ></video>
    <p id="mid-video-err"
       style="display:none;color:#e74c3c;font-size:.9em;">
      Oops — video couldn't load. Press Keep Going to continue!
    </p>
    <div style="display:flex;gap:11px;align-items:center;">
      <button class="btn g"
        onclick="onMidVideoContinue()"
        style="margin-top:8px;">
        Keep going
      </button>
      <button class="rrb" onclick="reread()">Replay</button>
    </div>
    <p class="txt" style="font-size:.82em;color:#aaa;">
      Press <strong>Keep going</strong> whenever you are ready.
    </p>
  `);

  say('mid_video');

  const vid = document.getElementById('mid-video');
  if(vid){
    vid.addEventListener('ended', function(){
      setTimeout(onMidVideoContinue, 1200);
    });
  }
}

function onMidVideoContinue(){
  const vid = document.getElementById('mid-video');
  if(vid && typeof vid.pause === 'function'){
    vid.pause();
  }
  showBkIntro();
}

// ── Between blocks ────────────────────────────────────────────
function advBlock(){
  G.bIdx++;
  if(G.bIdx >= 2){ showEnd(); return; }
  G.tOrder = shuffle([0,1,2,3,4,5]);
  G.tIdx   = 0;
  if(MID_VIDEO){
    showMidVideo();
  } else {
    showBkIntro();
  }
}

// ═══════════════════════════════════════════════════════════
//  END
// ═══════════════════════════════════════════════════════════
function showEnd(){
  try{ localStorage.setItem('twizzle_'+G.pid, JSON.stringify(G)); }catch(e){}
  render(`
    <div class="big-celebrate" style="width:100px;height:100px;">${STAR_SVG}</div>
    <h1>You did it!</h1>
    ${starMeterHTML()}
    <p class="txt" style="font-size:1.1em;">
      Thank you <strong>SO much</strong>
      for visiting ${VILLAGE}!<br>
      You were absolutely <strong>amazing!</strong>
    </p>
    <video
      id="end-video"
      src="${END_VIDEO.src}"
      controls
      autoplay
      playsinline
      style="
        width:100%;
        max-width:500px;
        border-radius:16px;
        box-shadow:0 6px 24px rgba(0,0,0,.18);
      "
      onerror="document.getElementById('end-video-err').style.display='block'"
    ></video>
    <p id="end-video-err"
       style="display:none;color:#e74c3c;font-size:.9em;">
      Oops — video couldn't load.
    </p>
    <p class="txt" style="font-size:.85em;color:#95a5a6;">
      ${G.resp.length} questions answered
    </p>
    <button class="btn g" onclick="dlCSV()">Save my data</button>
  `);
  // Play end narration alongside the video
  say('end_video');
  try{ window.parent.postMessage({type:'GAME_COMPLETE'}, '*'); }catch(e){}
}

// ═══════════════════════════════════════════════════════════
//  DATA EXPORT
// ═══════════════════════════════════════════════════════════
function dlCSV(){
  if(!G.resp.length){ alert('No data yet!'); return; }
  const esc  = v => `"${String(v===undefined?'':v).replace(/"/g,'""')}"`;
  const rows = G.resp.map(r => CSV_COLS.map(c => esc(r[c])).join(','));
  const csv  = [CSV_COLS.join(','), ...rows].join('\n');
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `twizzle_${G.pid}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
function skipEnd(){
  if(_aud){ _aud.pause(); _aud = null; }
  showEnd();
}

// ═══════════════════════════════════════════════════════════
//  FULLSCREEN + RESEARCHER PANEL
// ═══════════════════════════════════════════════════════════
function toggleFullscreen(){
  const doc  = document;
  const root = document.documentElement;
  const fsEl = doc.fullscreenElement || doc.webkitFullscreenElement;
  if(!fsEl){
    if(root.requestFullscreen)        root.requestFullscreen().catch(function(e){console.warn(e)});
    else if(root.webkitRequestFullscreen) root.webkitRequestFullscreen();
  } else {
    if(doc.exitFullscreen)        doc.exitFullscreen().catch(function(e){console.warn(e)});
    else if(doc.webkitExitFullscreen) doc.webkitExitFullscreen();
  }
}

// Secret reveal: 5 taps in the top-right corner within 3 seconds
let _secretTaps = [];
function _secretTap(){
  const now = Date.now();
  _secretTaps = _secretTaps.filter(function(t){ return now - t < 3000; });
  _secretTaps.push(now);
  if(_secretTaps.length >= 5){
    _secretTaps = [];
    toggleResearcher();
  }
}
function toggleResearcher(){
  const rbar = document.getElementById('rbar');
  if(rbar) rbar.classList.toggle('shown');
}
// Keyboard backup: Shift + R toggles the researcher panel
document.addEventListener('keydown', function(e){
  if(e.shiftKey && (e.key === 'R' || e.key === 'r')){
    e.preventDefault();
    toggleResearcher();
  }
});

// ─── Researcher skip controls ────────────────────────────────
function researcherSkipTrial(){
  if(_aud){ _aud.pause(); }
  _cancelChain();
  if(!G.t0){ alert('Start the game first.'); return; }
  // Record an empty placeholder so the trial index advances cleanly
  G.tIdx++;
  G.totalDone++;
  if(G.totalDone % 2 === 0){
    G.stars = Math.min(6, G.totalDone / 2);
  }
  if(G.tIdx >= 6){
    advBlock();
  } else {
    nextTrial();
  }
}
function researcherSkipBlock(){
  if(_aud){ _aud.pause(); }
  _cancelChain();
  if(!G.t0){ alert('Start the game first.'); return; }
  // Jump out of the current block
  const before = G.bIdx;
  G.tIdx = 6;
  G.totalDone = Math.max(G.totalDone, (before + 1) * 6);
  G.stars = Math.min(6, Math.floor(G.totalDone / 2));
  advBlock();
}
function researcherJumpToTrial(){
  if(!G.t0){ alert('Start the game first.'); return; }
  const raw = prompt('Jump to story # (1–12):', '1');
  if(raw === null) return;
  const n = parseInt(raw, 10);
  if(!(n >= 1 && n <= 12)){ alert('Enter a number 1–12.'); return; }
  if(_aud){ _aud.pause(); }
  _cancelChain();
  const targetBlockIdx = n > 6 ? 1 : 0;
  const targetTrialInBlock = ((n - 1) % 6);
  G.bIdx = targetBlockIdx;
  G.tIdx = targetTrialInBlock;
  G.totalDone = n - 1;
  G.stars = Math.min(6, Math.floor(G.totalDone / 2));
  if(targetTrialInBlock === 0){
    // Start of a block — show block intro
    if(!G.tOrder.length) G.tOrder = shuffle([0,1,2,3,4,5]);
    showBkIntro();
  } else {
    nextTrial();
  }
}

showWelcome();
</script>
